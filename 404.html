<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="design-tokens.css"/>
  <title>Seite nicht gefunden — wirflirten</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-serif); background: var(--color-surface-page); color: var(--color-text-secondary); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .brand { font-weight: 900; font-size: 22px; color: var(--color-text-primary); margin-bottom: 24px; }
    .brand span { color: var(--color-accent); }
    .code { font-size: 72px; font-weight: 900; color: var(--color-accent); line-height: 1; }
    h1 { font-size: 24px; color: var(--color-text-primary); margin: 12px 0 16px; }
    p { color: var(--color-text-tertiary); margin-bottom: 24px; }
    a.home { display: inline-block; background: var(--gradient-primary); color: var(--color-text-inverse); font-weight: 900; padding: 14px 28px; border-radius: var(--radius-md); text-decoration: none; }
  </style>
</head>
<body>
  <div>
    <div class="brand">wir<span>flirten</span></div>
    <div class="code">404</div>
    <h1>Diese Seite gibt es nicht.</h1>
    <p>Vielleicht hast du dich vertippt — oder die Seite ist umgezogen.</p>
    <a class="home" href="/">← Zurück zur Startseite</a>
  </div>
</body>
</html>
