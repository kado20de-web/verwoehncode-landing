<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842">
  <rect width="595" height="842" fill="#faf6ef"/>
  <rect x="7" y="7" width="581" height="828" fill="none" stroke="#e7ddcb" stroke-width="2"/>
  <text x="70" y="62" font-family="Georgia, serif" font-size="12" fill="#b08a3e" letter-spacing="2">101 ROMANTISCHE IDEEN</text>
  <text x="525" y="62" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#b08a3e" letter-spacing="2">LESEPROBE</text>
  <line x1="70" y1="80" x2="525" y2="80" stroke="#e7ddcb" stroke-width="1"/>
  <text x="70" y="140" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#1a1a1a">Kapitel 1 · Kleine Gesten, große Wirkung</text>
  <text x="297.5" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="92" fill="#e8a045" opacity="0.07" transform="rotate(-28 297.5 480)">LESEPROBE</text>
  <text x="70" y="215" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Romantik ist keine Frage des Geldes oder der Zeit.</text><text x="70" y="245" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Es sind die kleinen, ehrlichen Gesten, die im</text><text x="70" y="275" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Gedächtnis bleiben und eine Beziehung tragen.</text><text x="70" y="335" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Idee 1 — Die handgeschriebene Notiz</text><text x="70" y="365" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Versteck morgens einen kurzen Zettel in der</text><text x="70" y="395" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Jackentasche deines Partners. Drei Sätze genügen:</text><text x="70" y="425" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Schreib, wofür du heute dankbar bist.</text><text x="70" y="485" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Idee 2 — Der Lieblingssong am Morgen</text><text x="70" y="515" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Weckt den Tag mit dem Lied, zu dem ihr euch</text><text x="70" y="545" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">kennengelernt habt. Eine kleine Reise zum Anfang.</text>
  <text x="297.5" y="792" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b3a589">— 1 —</text>
  <text x="297.5" y="812" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9bda6" letter-spacing="2">wirflirten</text>
</svg>