<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842">
  <rect width="595" height="842" fill="#faf6ef"/>
  <rect x="7" y="7" width="581" height="828" fill="none" stroke="#e7ddcb" stroke-width="2"/>
  <text x="70" y="62" font-family="Georgia, serif" font-size="12" fill="#b08a3e" letter-spacing="2">SO WERDET IHR EIN MUSTERPAAR</text>
  <text x="525" y="62" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#b08a3e" letter-spacing="2">LESEPROBE</text>
  <line x1="70" y1="80" x2="525" y2="80" stroke="#e7ddcb" stroke-width="1"/>
  <text x="70" y="140" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#1a1a1a">Die 5 Säulen einer starken Beziehung</text>
  <text x="297.5" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="92" fill="#e8a045" opacity="0.07" transform="rotate(-28 297.5 480)">LESEPROBE</text>
  <text x="70" y="215" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">1. Zuhören, um zu verstehen — nicht um zu antworten.</text><text x="70" y="245" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">2. Wertschätzung täglich aussprechen.</text><text x="70" y="275" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">3. Konflikte fair austragen, ohne Vorwürfe.</text><text x="70" y="305" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">4. Gemeinsame Rituale bewusst pflegen.</text><text x="70" y="335" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">5. Sich Freiraum lassen und Vertrauen schenken.</text><text x="70" y="395" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">In den nächsten Kapiteln machen wir jede Säule</text><text x="70" y="425" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">konkret — mit Übungen, die ihr heute starten könnt.</text>
  <text x="297.5" y="792" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b3a589">— 2 —</text>
  <text x="297.5" y="812" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9bda6" letter-spacing="2">wirflirten</text>
</svg>