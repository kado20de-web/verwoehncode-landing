<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842">
  <rect width="595" height="842" fill="#faf6ef"/>
  <rect x="7" y="7" width="581" height="828" fill="none" stroke="#e7ddcb" stroke-width="2"/>
  <text x="70" y="62" font-family="Georgia, serif" font-size="12" fill="#b08a3e" letter-spacing="2">101 ROMANTISCHE IDEEN</text>
  <text x="525" y="62" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#b08a3e" letter-spacing="2">LESEPROBE</text>
  <line x1="70" y1="80" x2="525" y2="80" stroke="#e7ddcb" stroke-width="1"/>
  <text x="70" y="140" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#1a1a1a">Idee 23 · Das Mini-Date zu Hause</text>
  <text x="297.5" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="92" fill="#e8a045" opacity="0.07" transform="rotate(-28 297.5 480)">LESEPROBE</text>
  <text x="70" y="215" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Ihr braucht keinen Babysitter und keine Reservierung,</text><text x="70" y="245" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">um euch wie frisch verliebt zu fühlen.</text><text x="70" y="305" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">So geht’s:</text><text x="70" y="335" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">1. Legt die Handys in ein anderes Zimmer.</text><text x="70" y="365" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">2. Deckt den Tisch hübsch — auch unter der Woche.</text><text x="70" y="395" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">3. Stellt euch eine Frage, die ihr nie gestellt habt.</text><text x="70" y="455" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Tipp: Stellt euch vor, es wäre euer erstes Date.</text><text x="70" y="485" font-family="Georgia, serif" font-size="17" fill="#3a3a3a">Wie würdet ihr einander zuhören? Genau so.</text>
  <text x="297.5" y="792" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b3a589">— 2 —</text>
  <text x="297.5" y="812" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c9bda6" letter-spacing="2">wirflirten</text>
</svg>